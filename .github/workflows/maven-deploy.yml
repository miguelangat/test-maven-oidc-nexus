name: Maven Build and Deploy with Nexus OIDC

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Required for OIDC token generation
permissions:
  id-token: write
  contents: read

env:
  NEXUS_URL: https://mgarzon.dev.repo.saas.sonatype.dev
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Maven Artifacts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Get GitHub OIDC Token
        id: get-github-token
        run: |
          set -euo pipefail
          echo "🔑 Requesting GitHub OIDC token..."

          GITHUB_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$NEXUS_URL" | jq -r '.value')

          if [ -z "$GITHUB_TOKEN" ] || [ "$GITHUB_TOKEN" = "null" ]; then
            echo "❌ Failed to get GitHub OIDC token"
            exit 1
          fi

          echo "✅ Successfully obtained GitHub OIDC token"

          # Decode token to show GitHub identity (for debugging)
          echo ""
          echo "📋 GitHub Token Claims (Identity Info):"
          echo "$GITHUB_TOKEN" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq '{
            repository: .repository,
            workflow: .workflow,
            ref: .ref,
            actor: .actor,
            repository_owner: .repository_owner,
            sub: .sub
          }' || echo "Unable to decode"

          echo "::add-mask::$GITHUB_TOKEN"
          echo "GITHUB_OIDC_TOKEN=$GITHUB_TOKEN" >> $GITHUB_ENV

      - name: Exchange for Nexus Token
        id: get-nexus-token
        run: |
          set -euo pipefail
          echo "🔄 Exchanging GitHub token for Nexus access token..."

          # Capture status + body so we can fail loudly on non-2xx.
          # Requested scopes must be present in Nexus's PrivilegeToScopeMapper:
          #   repository:read / repository:write / repository:delete / repository:admin
          #   <format>:read   / <format>:write   / <format>:delete   / <format>:admin
          # `maven:write` covers our maven-snapshots PUTs; `repository:write` is the generic
          # fallback. Avoid invented scopes like `maven:deploy` — they get filtered out and
          # if none of the requested scopes survive the filter, Nexus returns invalid_scope.
          HTTP_RESPONSE=$(mktemp)
          HTTP_STATUS=$(curl -sS -o "$HTTP_RESPONSE" -w '%{http_code}' \
            -X POST "$NEXUS_URL/service/rest/oauth2/token" \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'grant_type=urn:ietf:params:oauth:grant-type:token-exchange' \
            --data-urlencode "subject_token=$GITHUB_OIDC_TOKEN" \
            --data-urlencode 'subject_token_type=urn:ietf:params:oauth:token-type:access_token' \
            --data-urlencode 'scope=repository:write maven:write')

          BODY=$(cat "$HTTP_RESPONSE")
          rm -f "$HTTP_RESPONSE"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Token exchange failed: HTTP $HTTP_STATUS"
            echo "Response body: $BODY"
            exit 1
          fi

          NEXUS_TOKEN=$(echo "$BODY" | jq -r '.access_token')

          if [ -z "$NEXUS_TOKEN" ] || [ "$NEXUS_TOKEN" = "null" ]; then
            echo "❌ Response did not include an access_token"
            echo "Response body: $BODY"
            exit 1
          fi

          echo "✅ Successfully obtained Nexus access token"
          echo "Token expires in: $(echo "$BODY" | jq -r '.expires_in') seconds"
          echo "Granted scopes: $(echo "$BODY" | jq -r '.scope')"

          echo "::add-mask::$NEXUS_TOKEN"
          echo "NEXUS_TOKEN=$NEXUS_TOKEN" >> $GITHUB_ENV

      - name: Diagnose Nexus token
        run: |
          set -euo pipefail
          echo "🔍 Decoding Nexus JWT payload (non-sensitive — signature omitted)..."

          # Decode the JWT payload (middle segment) so we can read iss/sub/aud/exp/scope.
          # base64 of a JWT segment is URL-safe and may lack padding — fix that before decoding.
          decode_jwt_payload() {
            local seg="$1"
            # Restore base64 padding
            local pad=$(( (4 - ${#seg} % 4) % 4 ))
            seg="${seg}$(printf '=%.0s' $(seq 1 $pad))"
            # tr to standard alphabet
            printf '%s' "$seg" | tr -- '-_' '+/' | base64 -d 2>/dev/null
          }

          PAYLOAD=$(echo "$NEXUS_TOKEN" | cut -d. -f2)
          DECODED=$(decode_jwt_payload "$PAYLOAD")

          echo ""
          echo "📋 Decoded Nexus token payload:"
          echo "$DECODED" | jq '{
            iss: .iss,
            sub: .sub,
            aud: .aud,
            scope: .scope,
            scopes: .scopes,
            realm: .realm,
            iat: .iat,
            exp: .exp,
            exp_human: (.exp | todateiso8601),
            now_human: (now | todateiso8601),
            seconds_until_expiry: (.exp - now | floor)
          }' || echo "Unable to decode/parse"

          echo ""
          echo "🔍 Probing the token against authenticated and write endpoints..."
          echo ""

          # /v1/status is UNAUTHENTICATED on NXRM (returns 200 to anonymous).
          # Use /v1/security/users which requires nexus:users:read — distinguishes:
          #   200 → token authenticated AND user has nexus:users:read (likely admin)
          #   403 → token authenticated, user lacks privilege (still useful — auth works)
          #   401 → token NOT authenticated by OIDC realm; this is the real failure mode
          #
          # Also probe the snapshot repo's directory listing with auth.
          # A separate maven-snapshots write probe (HEAD) confirms the deploy-time privilege.
          probe() {
            local label="$1" url="$2"
            local body http_code
            body=$(mktemp)
            http_code=$(curl -sS -o "$body" -w '%{http_code}' \
              -H "Authorization: Bearer $NEXUS_TOKEN" "$url") || http_code="curl-error"
            printf '%-40s HTTP %s\n' "$label" "$http_code"
            # If non-2xx, surface body + auth-challenge header for clarity
            if [ "$http_code" != "200" ] && [ "$http_code" != "204" ]; then
              local challenge snippet
              challenge=$(curl -sSI -H "Authorization: Bearer $NEXUS_TOKEN" "$url" 2>/dev/null \
                | grep -i '^www-authenticate' | head -1 | tr -d '\r')
              [ -n "$challenge" ] && echo "  $challenge"
              snippet=$(head -c 300 "$body" 2>/dev/null)
              [ -n "$snippet" ] && echo "  body[:300]: $snippet"
            fi
            rm -f "$body"
          }

          probe "GET /v1/security/users (auth probe)"             "$NEXUS_URL/service/rest/v1/security/users?source=default"
          probe "GET /repository/maven-snapshots/"                "$NEXUS_URL/repository/maven-snapshots/"
          probe "GET maven-snapshots metadata for our artifact"   "$NEXUS_URL/repository/maven-snapshots/com/sonatype/test/nexus-oidc-test/maven-metadata.xml"

          # PUT a tiny test file to a writeable path to see if the user can write.
          # Use a unique random path under maven-snapshots so we don't clobber anything.
          PROBE_PATH="com/sonatype/test/auth-probe/$(date +%Y%m%d%H%M%S)/probe.txt"
          PROBE_URL="$NEXUS_URL/repository/maven-snapshots/$PROBE_PATH"
          PROBE_BODY=$(mktemp)
          STATUS=$(curl -sS -o "$PROBE_BODY" -w '%{http_code}' \
            -X PUT \
            -H "Authorization: Bearer $NEXUS_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary "auth-probe" \
            "$PROBE_URL") || STATUS="curl-error"
          printf '%-40s HTTP %s  (path: %s)\n' "PUT maven-snapshots probe file" "$STATUS" "$PROBE_PATH"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ] && [ "$STATUS" != "204" ]; then
            SNIPPET=$(head -c 300 "$PROBE_BODY" 2>/dev/null)
            [ -n "$SNIPPET" ] && echo "  body[:300]: $SNIPPET"
            CHALLENGE=$(curl -sSI -X PUT --data-binary "" \
              -H "Authorization: Bearer $NEXUS_TOKEN" "$PROBE_URL" 2>/dev/null \
              | grep -i '^www-authenticate' | head -1 | tr -d '\r')
            [ -n "$CHALLENGE" ] && echo "  $CHALLENGE"
          fi
          rm -f "$PROBE_BODY"

      - name: Configure Maven Settings
        run: |
          set -euo pipefail
          echo "⚙️ Configuring Maven settings.xml with Nexus token..."

          # Why we shell-expand $NEXUS_TOKEN into the file instead of using ${env.NEXUS_TOKEN}:
          # `<httpHeaders><value>` is read by maven-wagon-http; Maven core does NOT interpolate
          # env.* property references into arbitrary <server><configuration> elements before
          # handing them to wagon, so the literal string "Bearer ${env.NEXUS_TOKEN}" was being
          # sent — Nexus rejected with 401. Shell-expansion writes the literal token bytes into
          # the file. The token is already masked in the runner via ::add-mask:: so it won't
          # leak in subsequent step logs. We also chmod 600 so other runner processes can't
          # read it, and the Cleanup step deletes the file at the end of the job.
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0
                    http://maven.apache.org/xsd/settings-1.2.0.xsd">

            <servers>
              <!-- Nexus authentication using Bearer token. -->
              <!-- wagon-http reads <httpHeaders> from this <server><configuration> block; -->
              <!-- the wagon-http extension is declared in pom.xml so this is the active transport. -->
              <server>
                <id>nexus-releases</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>Bearer ${NEXUS_TOKEN}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>

              <server>
                <id>nexus-snapshots</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>Bearer ${NEXUS_TOKEN}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>
            </servers>

          </settings>
          EOF
          chmod 600 ~/.m2/settings.xml

          echo "✅ Maven settings.xml configured"

      - name: Build with Maven
        run: |
          set -euo pipefail
          echo "🔨 Building Maven project..."
          mvn clean package -DskipTests -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
          echo "✅ Build completed successfully"

      - name: Deploy to Nexus
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          echo "🚀 Deploying artifacts to Nexus via mvn deploy..."

          # Use mvn deploy rather than hand-rolled curl PUTs. The Maven deploy plugin handles
          # the things that previously failed:
          #   * Snapshot timestamp generation (NXRM3 maven-snapshots rejects non-timestamped uploads with 400)
          #   * maven-metadata.xml authoring
          #   * Checksum files (.md5, .sha1, .sha256, .sha512)
          #   * Content-Type negotiation
          #
          # The alternate-deployment-repository syntax dropped the `::default::` layout segment
          # in Maven 3.8.1+ (id::url is the modern form; id::layout::url is legacy and warns).
          #
          # The -Daether.connector.http.headers.<serverId>.Authorization fallback covers the
          # case where Maven routes through maven-resolver-transport-http instead of
          # maven-wagon-http (which would ignore the <httpHeaders> in settings.xml). With
          # both paths configured the Bearer header reaches Nexus regardless of which
          # transport Maven picks.
          mvn deploy -DskipTests -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -DaltSnapshotDeploymentRepository="nexus-snapshots::$NEXUS_URL/repository/maven-snapshots/" \
            -DaltReleaseDeploymentRepository="nexus-releases::$NEXUS_URL/repository/maven-releases/" \
            -Daether.connector.http.headers.nexus-snapshots.Authorization="Bearer $NEXUS_TOKEN" \
            -Daether.connector.http.headers.nexus-releases.Authorization="Bearer $NEXUS_TOKEN"

          echo "✅ Deployment completed successfully"

      - name: Verify Deployment
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          echo "🔍 Verifying deployment..."

          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

          echo "Deployed artifact: $GROUP_ID:$ARTIFACT_ID:$VERSION"

          # Determine repository (snapshots vs releases)
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            REPO="maven-snapshots"
          else
            REPO="maven-releases"
          fi

          GROUP_PATH=${GROUP_ID//./\/}
          ARTIFACT_DIR_URL="$NEXUS_URL/repository/$REPO/$GROUP_PATH/$ARTIFACT_ID/$VERSION/"
          METADATA_URL="$NEXUS_URL/repository/$REPO/$GROUP_PATH/$ARTIFACT_ID/maven-metadata.xml"

          echo "Checking artifact directory: $ARTIFACT_DIR_URL"

          # --fail-with-body so a 4xx surfaces with the server's message; -i to print headers.
          if curl --fail-with-body -sS -o /tmp/dir.html -w 'HTTP %{http_code}\n' \
              -H "Authorization: Bearer $NEXUS_TOKEN" \
              "$ARTIFACT_DIR_URL"; then
            echo "✅ Artifact directory accessible in $REPO"
          else
            echo "⚠️ Could not list artifact directory; deployment may still be present"
          fi

          echo ""
          echo "Checking maven-metadata.xml: $METADATA_URL"
          if curl --fail-with-body -sS -o /tmp/meta.xml -w 'HTTP %{http_code}\n' \
              -H "Authorization: Bearer $NEXUS_TOKEN" \
              "$METADATA_URL"; then
            echo "✅ maven-metadata.xml present"
            echo "Latest snapshot info:"
            grep -E '<(timestamp|buildNumber|version|lastUpdated)>' /tmp/meta.xml | head -10 || true
          else
            echo "⚠️ Could not fetch maven-metadata.xml"
          fi

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 Deployment Summary"
          echo "=========================================="
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "=========================================="

      - name: Cleanup
        if: always()
        run: |
          # Remove settings.xml so the token (resolved via env at runtime) isn't reused.
          rm -f ~/.m2/settings.xml
          echo "🧹 Cleaned up temporary Maven settings"
