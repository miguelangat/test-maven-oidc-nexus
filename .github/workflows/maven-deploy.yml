name: Maven Build and Deploy with Nexus OIDC

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Required for OIDC token generation
permissions:
  id-token: write
  contents: read

env:
  NEXUS_URL: https://mgarzon.dev.repo.saas.sonatype.dev
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Maven Artifacts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Get GitHub OIDC Token
        id: get-github-token
        run: |
          set -euo pipefail
          echo "🔑 Requesting GitHub OIDC token..."

          GITHUB_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$NEXUS_URL" | jq -r '.value')

          if [ -z "$GITHUB_TOKEN" ] || [ "$GITHUB_TOKEN" = "null" ]; then
            echo "❌ Failed to get GitHub OIDC token"
            exit 1
          fi

          echo "✅ Successfully obtained GitHub OIDC token"

          # Decode token to show GitHub identity (for debugging)
          echo ""
          echo "📋 GitHub Token Claims (Identity Info):"
          echo "$GITHUB_TOKEN" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq '{
            repository: .repository,
            workflow: .workflow,
            ref: .ref,
            actor: .actor,
            repository_owner: .repository_owner,
            sub: .sub
          }' || echo "Unable to decode"

          echo "::add-mask::$GITHUB_TOKEN"
          echo "GITHUB_OIDC_TOKEN=$GITHUB_TOKEN" >> $GITHUB_ENV

      - name: Exchange for Nexus Token
        id: get-nexus-token
        run: |
          set -euo pipefail
          echo "🔄 Exchanging GitHub token for Nexus access token..."

          # Capture status + body so we can fail loudly on non-2xx.
          # Requested scopes must be present in Nexus's PrivilegeToScopeMapper:
          #   repository:read / repository:write / repository:delete / repository:admin
          #   <format>:read   / <format>:write   / <format>:delete   / <format>:admin
          # `maven:write` covers our maven-snapshots PUTs; `repository:write` is the generic
          # fallback. Avoid invented scopes like `maven:deploy` — they get filtered out and
          # if none of the requested scopes survive the filter, Nexus returns invalid_scope.
          HTTP_RESPONSE=$(mktemp)
          HTTP_STATUS=$(curl -sS -o "$HTTP_RESPONSE" -w '%{http_code}' \
            -X POST "$NEXUS_URL/service/rest/oauth2/token" \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'grant_type=urn:ietf:params:oauth:grant-type:token-exchange' \
            --data-urlencode "subject_token=$GITHUB_OIDC_TOKEN" \
            --data-urlencode 'subject_token_type=urn:ietf:params:oauth:token-type:access_token' \
            --data-urlencode 'scope=repository:write maven:write')

          BODY=$(cat "$HTTP_RESPONSE")
          rm -f "$HTTP_RESPONSE"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Token exchange failed: HTTP $HTTP_STATUS"
            echo "Response body: $BODY"
            exit 1
          fi

          NEXUS_TOKEN=$(echo "$BODY" | jq -r '.access_token')

          if [ -z "$NEXUS_TOKEN" ] || [ "$NEXUS_TOKEN" = "null" ]; then
            echo "❌ Response did not include an access_token"
            echo "Response body: $BODY"
            exit 1
          fi

          echo "✅ Successfully obtained Nexus access token"
          echo "Token expires in: $(echo "$BODY" | jq -r '.expires_in') seconds"
          echo "Granted scopes: $(echo "$BODY" | jq -r '.scope')"

          echo "::add-mask::$NEXUS_TOKEN"
          echo "NEXUS_TOKEN=$NEXUS_TOKEN" >> $GITHUB_ENV

      - name: Configure Maven Settings
        run: |
          set -euo pipefail
          echo "⚙️ Configuring Maven settings.xml with Nexus token..."

          # Note the placeholder ${env.NEXUS_TOKEN} — Maven 3.9+ resolves env.* at runtime,
          # so we do NOT shell-expand the token into the file on disk. That keeps the secret
          # out of the artifact cache and out of any debug dump of settings.xml.
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0
                    http://maven.apache.org/xsd/settings-1.2.0.xsd">

            <servers>
              <!-- Nexus authentication using Bearer token (resolved from NEXUS_TOKEN env at runtime) -->
              <server>
                <id>nexus-releases</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>Bearer ${env.NEXUS_TOKEN}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>

              <server>
                <id>nexus-snapshots</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>Bearer ${env.NEXUS_TOKEN}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>
            </servers>

          </settings>
          EOF

          echo "✅ Maven settings.xml configured"

      - name: Build with Maven
        run: |
          set -euo pipefail
          echo "🔨 Building Maven project..."
          mvn clean package -DskipTests -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
          echo "✅ Build completed successfully"

      - name: Deploy to Nexus
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          echo "🚀 Deploying artifacts to Nexus via mvn deploy..."

          # Use mvn deploy rather than hand-rolled curl PUTs. The Maven deploy plugin handles
          # the things that previously failed:
          #   * Snapshot timestamp generation (NXRM3 maven-snapshots rejects non-timestamped uploads with 400)
          #   * maven-metadata.xml authoring
          #   * Checksum files (.md5, .sha1, .sha256, .sha512)
          #   * Content-Type negotiation
          #
          # `-DaltDeploymentRepository=nexus-snapshots::default::$NEXUS_URL/repository/maven-snapshots/`
          # overrides whatever distributionManagement says, so the pom.xml's potentially stale
          # ngrok URL doesn't matter.
          mvn deploy -DskipTests -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -DaltSnapshotDeploymentRepository="nexus-snapshots::default::$NEXUS_URL/repository/maven-snapshots/" \
            -DaltReleaseDeploymentRepository="nexus-releases::default::$NEXUS_URL/repository/maven-releases/"

          echo "✅ Deployment completed successfully"

      - name: Verify Deployment
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          echo "🔍 Verifying deployment..."

          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

          echo "Deployed artifact: $GROUP_ID:$ARTIFACT_ID:$VERSION"

          # Determine repository (snapshots vs releases)
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            REPO="maven-snapshots"
          else
            REPO="maven-releases"
          fi

          GROUP_PATH=${GROUP_ID//./\/}
          ARTIFACT_DIR_URL="$NEXUS_URL/repository/$REPO/$GROUP_PATH/$ARTIFACT_ID/$VERSION/"
          METADATA_URL="$NEXUS_URL/repository/$REPO/$GROUP_PATH/$ARTIFACT_ID/maven-metadata.xml"

          echo "Checking artifact directory: $ARTIFACT_DIR_URL"

          # --fail-with-body so a 4xx surfaces with the server's message; -i to print headers.
          if curl --fail-with-body -sS -o /tmp/dir.html -w 'HTTP %{http_code}\n' \
              -H "Authorization: Bearer $NEXUS_TOKEN" \
              "$ARTIFACT_DIR_URL"; then
            echo "✅ Artifact directory accessible in $REPO"
          else
            echo "⚠️ Could not list artifact directory; deployment may still be present"
          fi

          echo ""
          echo "Checking maven-metadata.xml: $METADATA_URL"
          if curl --fail-with-body -sS -o /tmp/meta.xml -w 'HTTP %{http_code}\n' \
              -H "Authorization: Bearer $NEXUS_TOKEN" \
              "$METADATA_URL"; then
            echo "✅ maven-metadata.xml present"
            echo "Latest snapshot info:"
            grep -E '<(timestamp|buildNumber|version|lastUpdated)>' /tmp/meta.xml | head -10 || true
          else
            echo "⚠️ Could not fetch maven-metadata.xml"
          fi

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 Deployment Summary"
          echo "=========================================="
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "=========================================="

      - name: Cleanup
        if: always()
        run: |
          # Remove settings.xml so the token (resolved via env at runtime) isn't reused.
          rm -f ~/.m2/settings.xml
          echo "🧹 Cleaned up temporary Maven settings"
